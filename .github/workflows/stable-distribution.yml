name: Stable Distribution

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Public non-latest App release tag, for example v26.7.13
        required: true
        type: string
      stable_session_id:
        description: sha256 release session id from the App promotion state machine
        required: true
        type: string
      release_cohort_ref:
        description: sha256 exact-cohort manifest ref
        required: true
        type: string
      app_sha:
        description: Frozen App commit SHA
        required: true
        type: string
      shell_sha:
        description: Frozen active shell commit SHA
        required: true
        type: string
      framework_sha:
        description: Frozen Framework commit SHA
        required: true
        type: string
      source_release_run_id:
        description: App release workflow run that owns the qualified assets
        required: true
        type: string
      full_vm_run_id:
        description: Exact-cohort Full clean-VM Actions run id
        required: true
        type: string
      full_vm_evidence_ref:
        description: Artifact ref containing the Full clean-VM evidence receipt
        required: true
        type: string
      full_vm_evidence_sha256:
        description: SHA-256 of the exact Full clean-VM evidence receipt bytes
        required: true
        type: string
      full_vm_result:
        description: Full clean-VM qualification result
        required: true
        type: choice
        options:
          - passed

permissions:
  contents: write

concurrency:
  group: opl-homebrew-tap-write
  cancel-in-progress: false

jobs:
  distribute:
    name: Atomically publish Standard and Full casks
    runs-on: macos-latest
    outputs:
      receipt_artifact: ${{ steps.identity.outputs.receipt_artifact }}
      receipt_tag: ${{ steps.identity.outputs.receipt_tag }}
      tap_commit: ${{ steps.commit.outputs.tap_commit }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve immutable distribution identity
        id: identity
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          STABLE_SESSION_ID: ${{ inputs.stable_session_id }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          session_hex="${STABLE_SESSION_ID#sha256:}"
          receipt_tag="stable-distribution/v${version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${receipt_tag}" >/dev/null 2>&1; then
            echo "::error::Immutable distribution receipt tag ${receipt_tag} already exists. Use its receipt instead of writing a second Stable distribution."
            exit 1
          fi
          {
            echo "version=$version"
            echo "session_hex=$session_hex"
            echo "receipt_tag=$receipt_tag"
            echo "receipt_artifact=opl-stable-distribution-receipt-${version}-${session_hex}"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare both Stable casks from one App release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          node scripts/prepare-stable-distribution.mjs \
            --release-tag "${{ inputs.release_tag }}" \
            --stable-session-id "${{ inputs.stable_session_id }}" \
            --release-cohort-ref "${{ inputs.release_cohort_ref }}" \
            --app-sha "${{ inputs.app_sha }}" \
            --shell-sha "${{ inputs.shell_sha }}" \
            --framework-sha "${{ inputs.framework_sha }}" \
            --source-release-run-id "${{ inputs.source_release_run_id }}" \
            --full-vm-run-id "${{ inputs.full_vm_run_id }}" \
            --full-vm-evidence-ref "${{ inputs.full_vm_evidence_ref }}" \
            --full-vm-evidence-sha256 "${{ inputs.full_vm_evidence_sha256 }}" \
            --full-vm-result "${{ inputs.full_vm_result }}" \
            --output "$RUNNER_TEMP/opl-stable-distribution-plan.json"

      - name: Verify the single-owner tap boundary
        run: |
          set -euo pipefail
          node test/downstream-boundary.test.mjs
          node test/stable-distribution.test.mjs

      - name: Validate both casks before publication
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          brew tap "$GITHUB_REPOSITORY" "$GITHUB_WORKSPACE"
          if brew help trust >/dev/null 2>&1; then
            brew trust "$GITHUB_REPOSITORY"
          fi
          brew style --cask "$GITHUB_REPOSITORY/one-person-lab" "$GITHUB_REPOSITORY/one-person-lab-full"
          brew audit --cask --online "$GITHUB_REPOSITORY/one-person-lab"
          brew audit --cask --online "$GITHUB_REPOSITORY/one-person-lab-full"

      - name: Commit both casks and atomically publish the receipt tag
        id: commit
        shell: bash
        env:
          RECEIPT_TAG: ${{ steps.identity.outputs.receipt_tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/one-person-lab.rb Casks/one-person-lab-full.rb
          if git diff --cached --quiet; then
            echo "::error::Formal Stable distribution must advance Standard and Full in one new commit; both casks already match."
            exit 1
          fi
          git commit -m "Distribute One Person Lab ${{ steps.identity.outputs.version }} Stable casks"
          tap_commit="$(git rev-parse HEAD)"
          node scripts/finalize-stable-distribution-receipt.mjs \
            --plan "$RUNNER_TEMP/opl-stable-distribution-plan.json" \
            --tap-commit "$tap_commit" \
            --annotated-tag "$RECEIPT_TAG" \
            --output "$RUNNER_TEMP/opl-stable-distribution-receipt.json"
          git tag -a "$RECEIPT_TAG" "$tap_commit" -F "$RUNNER_TEMP/opl-stable-distribution-receipt.json"
          git push --atomic origin HEAD:main "refs/tags/${RECEIPT_TAG}"
          echo "tap_commit=$tap_commit" >> "$GITHUB_OUTPUT"

      - name: Verify remote commit and immutable receipt tag
        shell: bash
        env:
          RECEIPT_TAG: ${{ steps.identity.outputs.receipt_tag }}
          TAP_COMMIT: ${{ steps.commit.outputs.tap_commit }}
        run: |
          set -euo pipefail
          remote_main="$(git ls-remote origin refs/heads/main | awk '{print $1}')"
          local_receipt_tag_object="$(git rev-parse "refs/tags/${RECEIPT_TAG}")"
          remote_receipt_tag_object="$(git ls-remote origin "refs/tags/${RECEIPT_TAG}" | awk '{print $1}')"
          remote_receipt_commit="$(git ls-remote origin "refs/tags/${RECEIPT_TAG}^{}" | awk '{print $1}')"
          test "$remote_main" = "$TAP_COMMIT"
          test "$remote_receipt_tag_object" = "$local_receipt_tag_object"
          test "$remote_receipt_commit" = "$TAP_COMMIT"

      - name: Upload Stable distribution receipt
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.identity.outputs.receipt_artifact }}
          path: ${{ runner.temp }}/opl-stable-distribution-receipt.json
          if-no-files-found: error
          retention-days: 90
