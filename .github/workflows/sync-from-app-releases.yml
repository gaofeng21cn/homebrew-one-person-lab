name: Sync From App Releases

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Cask channel to sync
        required: true
        default: nightly
        type: choice
        options:
          - stable
          - nightly
          - full
          - all
      release_tag:
        description: Optional explicit App release tag, for example v26.6.3-nightly
        required: false
        type: string
  schedule:
    - cron: '17 23 * * *'

permissions:
  contents: write

concurrency:
  group: sync-from-app-releases-${{ github.event.inputs.channel || 'nightly' }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve sync channels
        id: channels
        shell: bash
        run: |
          set -euo pipefail
          channel="${{ github.event.inputs.channel || 'nightly' }}"
          release_tag="${{ github.event.inputs.release_tag }}"
          if [ "$channel" = "all" ] && [ -n "$release_tag" ]; then
            echo "::error::release_tag can only be used with stable, nightly, or full, not all."
            exit 1
          fi
          if [ "$channel" = "all" ]; then
            echo "channels=stable nightly full" >> "$GITHUB_OUTPUT"
          else
            echo "channels=$channel" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync casks from App releases
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CHANNELS: ${{ steps.channels.outputs.channels }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          report_app_release_failure() {
            status=$?
            echo "::error::Homebrew tap sync failed in a downstream mirror. Route the failing tag, asset, digest, or audit output to the App release operator/authority for gaofeng21cn/one-person-lab-app; do not create tap-local release truth/currentness."
            exit "$status"
          }
          trap report_app_release_failure ERR
          for channel in $CHANNELS; do
            args=(--channel "$channel")
            if [ -n "$RELEASE_TAG" ]; then
              args+=(--release-tag "$RELEASE_TAG")
            fi
            node scripts/sync-cask-from-release.mjs "${args[@]}"
          done

      - name: Validate tap
        shell: bash
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -d Formula ]; then
            echo "::error::This tap is App cask-only; Formula/ must not be published."
            exit 1
          fi
          if find Casks -type f ! -name 'one-person-lab.rb' ! -name 'one-person-lab-nightly.rb' ! -name 'one-person-lab-full.rb' | grep .; then
            echo "::error::This tap may publish only the stable, nightly, and Full App casks."
            exit 1
          fi
          if grep -R "cask \"one-person-lab-modules\\|url .*one-person-lab-modules" Casks; then
            echo "::error::This tap must not publish module or agent-pack Homebrew targets."
            exit 1
          fi
          if grep -R "One-Person-Lab-Full" Casks/one-person-lab.rb Casks/one-person-lab-nightly.rb; then
            echo "::error::Only Casks/one-person-lab-full.rb may reference Full first-install assets."
            exit 1
          fi
          report_app_release_failure() {
            status=$?
            echo "::error::Homebrew tap audit failed in a downstream mirror. Route the audit output to the App release operator/authority for gaofeng21cn/one-person-lab-app; do not create tap-local release truth/currentness."
            exit "$status"
          }
          trap report_app_release_failure ERR
          brew tap "$GITHUB_REPOSITORY" "$GITHUB_WORKSPACE"
          if brew help trust >/dev/null 2>&1; then
            brew trust "$GITHUB_REPOSITORY"
          fi
          brew style --cask "$GITHUB_REPOSITORY/one-person-lab" "$GITHUB_REPOSITORY/one-person-lab-nightly" "$GITHUB_REPOSITORY/one-person-lab-full"
          brew audit --cask --online --no-signing "$GITHUB_REPOSITORY/one-person-lab"
          brew audit --cask --no-signing "$GITHUB_REPOSITORY/one-person-lab-nightly"
          brew audit --cask --online --no-signing "$GITHUB_REPOSITORY/one-person-lab-full"

      - name: Commit tap update
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No Homebrew cask updates."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/one-person-lab.rb Casks/one-person-lab-nightly.rb Casks/one-person-lab-full.rb
          git commit -m "Sync OPL Homebrew casks from App releases"
          git push origin HEAD:main
